name: Build & Publish carton (Direct Release Upload)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.2.3 or v1.2.3-beta.1)'
        required: true
        type: string

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_XMLDOC_MODE: skip
  APP_NAME: carton

jobs:
  metadata:
    name: Resolve metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      channel: ${{ steps.meta.outputs.channel }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      tag: ${{ steps.meta.outputs.tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.tag }}"

          if [[ -z "$tag" ]]; then
            echo "inputs.tag is required." >&2
            exit 1
          fi

          version="$tag"
          if [[ "$version" == v* ]]; then
            version="${version#v}"
          fi

          channel="release"
          is_prerelease="false"
          shopt -s nocasematch
          if [[ "$tag" == *-beta* ]] || [[ "$tag" == *-rc* ]] || [[ "$tag" == *-preview* ]] || [[ "$version" == *-beta* ]] || [[ "$version" == *-rc* ]] || [[ "$version" == *-preview* ]]; then
            channel="beta"
            is_prerelease="true"
          fi
          shopt -u nocasematch

          app_name="${APP_NAME:-carton}"
          release_name="${app_name} ${version}"

          {
            echo "version=${version}"
            echo "channel=${channel}"
            echo "is_prerelease=${is_prerelease}"
            echo "tag=${tag}"
            echo "release_name=${release_name}"
          } >> "$GITHUB_OUTPUT"

  prepare_release:
    name: Prepare GitHub release
    runs-on: ubuntu-latest
    needs: metadata
    steps:
      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.metadata.outputs.tag }}
          REPO: ${{ github.repository }}
          RELEASE_NAME: ${{ needs.metadata.outputs.release_name }}
          IS_PRERELEASE: ${{ needs.metadata.outputs.is_prerelease }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          args=("$TAG" "--repo" "$REPO" "--title" "$RELEASE_NAME")
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            args+=("--prerelease")
          fi

          target_ref="$TARGET_SHA"
          if gh api "repos/$REPO/git/ref/heads/$TAG" >/dev/null 2>&1; then
            target_ref="$TAG"
          fi

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release edit "${args[@]}"
          else
            gh release create "${args[@]}" --target "$target_ref" --notes ""
          fi

      - name: Clear existing release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.metadata.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          gh api "repos/$REPO/releases/tags/$TAG" --jq '.assets[].id' | while read -r asset_id; do
            [[ -n "$asset_id" ]] || continue
            gh api "repos/$REPO/releases/assets/$asset_id" --method DELETE
          done

  build:
    name: Build ${{ matrix.rid }}
    needs:
      - metadata
      - prepare_release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            mainExe: carton.exe
            icon: src/carton.GUI/Assets/carton_icon.ico
          - os: windows-latest
            rid: win-arm64
            mainExe: carton.exe
            icon: src/carton.GUI/Assets/carton_icon.ico
          - os: ubuntu-22.04
            rid: linux-x64
            mainExe: carton
            icon: src/carton.GUI/Assets/carton_icon.png
          - os: ubuntu-22.04
            rid: linux-arm64
            mainExe: carton
            icon: src/carton.GUI/Assets/carton_icon.png
    env:
      VERSION: ${{ needs.metadata.outputs.version }}
      CHANNEL: ${{ needs.metadata.outputs.channel }}
      TAG: ${{ needs.metadata.outputs.tag }}
      REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install native dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld binutils-aarch64-linux-gnu gcc-aarch64-linux-gnu libc6-dev-arm64-cross zlib1g-dev libkrb5-dev pkg-config

      - name: Install Velopack CLI (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          dotnet tool update --global vpk --version 0.0.1298
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Install NSIS (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nsis -y --no-progress

      - name: Publish (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          publish_dir="$GITHUB_WORKSPACE/artifacts/publish/${{ matrix.rid }}"
          mkdir -p "$publish_dir"
          props=(
            -c Release
            -r ${{ matrix.rid }}
            -o "$publish_dir"
            /p:PublishAot=true
            /p:SelfContained=true
            /p:StripSymbols=true
            /p:DebugSymbols=false
            /p:DebugType=None
            /p:InvariantGlobalization=true
            /p:IncludeNativeLibrariesForSelfExtract=true
            /p:EnableCompressionInSingleFile=true
          )
          if [[ "${{ matrix.rid }}" == "linux-arm64" ]]; then
            props+=(/p:ObjCopyName=aarch64-linux-gnu-objcopy)
          fi
          dotnet publish src/carton.GUI/carton.GUI.csproj "${props[@]}"
          bash scripts/include-singbox-kernel.sh "${{ matrix.rid }}" "$publish_dir"
          echo "PUBLISH_DIR=$publish_dir" >> "$GITHUB_ENV"

      - name: Publish (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $publishDirPortable = "$env:GITHUB_WORKSPACE\artifacts\publish\${{ matrix.rid }}-portable"
          $publishDirInstaller = "$env:GITHUB_WORKSPACE\artifacts\publish\${{ matrix.rid }}-installer"
          $kernelStageDir = Join-Path $env:RUNNER_TEMP "singbox-runtime-${{ matrix.rid }}"
          New-Item -ItemType Directory -Path $publishDirPortable -Force | Out-Null
          New-Item -ItemType Directory -Path $publishDirInstaller -Force | Out-Null
          if (Test-Path $kernelStageDir) {
            Remove-Item -Recurse -Force $kernelStageDir
          }
          New-Item -ItemType Directory -Path $kernelStageDir -Force | Out-Null
          dotnet publish src\carton.GUI\carton.GUI.csproj `
            -c Release `
            -r ${{ matrix.rid }} `
            -o $publishDirPortable `
            /p:PublishAot=true `
            /p:SelfContained=true `
            /p:StripSymbols=true `
            /p:DebugSymbols=false `
            /p:DebugType=None `
            /p:InvariantGlobalization=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:EnableCompressionInSingleFile=true
          & "$env:GITHUB_WORKSPACE\scripts\include-singbox-kernel.ps1" -Rid '${{ matrix.rid }}' -Destination $kernelStageDir
          Copy-Item -Path (Join-Path $kernelStageDir '*') -Destination $publishDirPortable -Recurse -Force
          dotnet publish src\carton.GUI\carton.GUI.csproj `
            -c Release `
            -r ${{ matrix.rid }} `
            -o $publishDirInstaller `
            /p:CartonBuildMacro=INSTALLER_BUILD `
            /p:PublishAot=true `
            /p:SelfContained=true `
            /p:StripSymbols=true `
            /p:DebugSymbols=false `
            /p:DebugType=None `
            /p:InvariantGlobalization=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:EnableCompressionInSingleFile=true
          Copy-Item -Path (Join-Path $kernelStageDir '*') -Destination $publishDirInstaller -Recurse -Force
          "PUBLISH_DIR_PORTABLE=$publishDirPortable" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PUBLISH_DIR_INSTALLER=$publishDirInstaller" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create portable archive (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          pack_dir="$GITHUB_WORKSPACE/artifacts/pack/${{ matrix.rid }}-$CHANNEL"
          mkdir -p "$pack_dir"
          find "$PUBLISH_DIR" -name '*.pdb' -delete
          portable_stage="$RUNNER_TEMP/portable-stage-${{ matrix.rid }}"
          rm -rf "$portable_stage"
          mkdir -p "$portable_stage"
          cp -a "$PUBLISH_DIR"/. "$portable_stage"/
          touch "$portable_stage/.carton_portable_data"
          portable_name="${APP_NAME}-${VERSION}-${{ matrix.rid }}-portable.tar.gz"
          tar -C "$portable_stage" -czf "$pack_dir/$portable_name" .
          echo "PACK_DIR=$pack_dir" >> "$GITHUB_ENV"

      - name: Create portable archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $packDir = "$env:GITHUB_WORKSPACE\artifacts\pack\${{ matrix.rid }}-$env:CHANNEL"
          New-Item -ItemType Directory -Path $packDir -Force | Out-Null
          Get-ChildItem -Path $env:PUBLISH_DIR_PORTABLE -Filter '*.pdb' -Recurse | Remove-Item -Force
          $portableStage = Join-Path $env:RUNNER_TEMP "portable-stage-${{ matrix.rid }}"
          if (Test-Path $portableStage) {
            Remove-Item -Recurse -Force $portableStage
          }
          New-Item -ItemType Directory -Path $portableStage -Force | Out-Null
          Copy-Item -Path (Join-Path $env:PUBLISH_DIR_PORTABLE '*') -Destination $portableStage -Recurse -Force
          New-Item -ItemType File -Path (Join-Path $portableStage '.carton_portable_data') -Force | Out-Null
          $portableName = "$env:APP_NAME-$env:VERSION-${{ matrix.rid }}-portable.zip"
          $portableItems = Get-ChildItem -Path $portableStage -Force | Select-Object -ExpandProperty FullName
          if (-not $portableItems) {
            Write-Error "Portable staging directory is empty: $portableStage"
          }
          Compress-Archive -LiteralPath $portableItems -DestinationPath "$packDir\$portableName" -Force
          "PACK_DIR=$packDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Package with Velopack (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          icon_path=$(realpath '${{ matrix.icon }}')
          package_channel='${{ matrix.rid }}-'$CHANNEL
          vpk pack \
            --packId "$APP_NAME" \
            --packVersion "$VERSION" \
            --channel "$package_channel" \
            --runtime ${{ matrix.rid }} \
            --packDir "$PUBLISH_DIR" \
            --mainExe '${{ matrix.mainExe }}' \
            --packTitle "$APP_NAME" \
            --icon "$icon_path" \
            --outputDir "$PACK_DIR"

      - name: Package with NSIS (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-ChildItem -Path $env:PUBLISH_DIR_INSTALLER -Filter '*.pdb' -Recurse | Remove-Item -Force
          & "$env:GITHUB_WORKSPACE\scripts\build-nsis-installer.ps1" `
            -AppName "$env:APP_NAME" `
            -AppId "$env:APP_NAME" `
            -Version "$env:VERSION" `
            -MainExe '${{ matrix.mainExe }}' `
            -PublishDir "$env:PUBLISH_DIR_INSTALLER" `
            -OutputDir "$env:PACK_DIR" `
            -OutputFileName "$env:APP_NAME-$env:VERSION-${{ matrix.rid }}-Setup.exe" `
            -AppDataDirName "Carton"

      - name: Prepare release assets (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          release_dir="$RUNNER_TEMP/release-assets-${{ matrix.rid }}"
          rm -rf "$release_dir"
          mkdir -p "$release_dir"

          for setup in "$PACK_DIR"/*setup.exe; do
            [[ -f "$setup" ]] || continue
            cp -f "$setup" "$release_dir/${APP_NAME}-${VERSION}-${{ matrix.rid }}-Setup.exe"
          done

          for appimage in "$PACK_DIR"/*.AppImage; do
            [[ -f "$appimage" ]] || continue
            cp -f "$appimage" "$release_dir/${APP_NAME}-${VERSION}-${{ matrix.rid }}.AppImage"
          done

          for pattern in '*-portable.zip' '*-portable.tar.gz' '*.nupkg' 'releases*.json'; do
            for f in "$PACK_DIR"/$pattern; do
              [[ -f "$f" ]] || continue
              cp -f "$f" "$release_dir/$(basename "$f")"
            done
          done

          if ! find "$release_dir" -maxdepth 1 -type f | grep -q .; then
            echo "No release assets were prepared." >&2
            exit 1
          fi

          echo "RELEASE_ASSETS_DIR=$release_dir" >> "$GITHUB_ENV"

      - name: Prepare release assets (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $releaseDir = Join-Path $env:RUNNER_TEMP "release-assets-${{ matrix.rid }}"
          if (Test-Path $releaseDir) {
            Remove-Item -Recurse -Force $releaseDir
          }
          New-Item -ItemType Directory -Path $releaseDir -Force | Out-Null

          $setup = Get-ChildItem -Path $env:PACK_DIR -Filter '*setup.exe' -File | Select-Object -First 1
          if ($setup) {
            Copy-Item $setup.FullName (Join-Path $releaseDir "$env:APP_NAME-$env:VERSION-${{ matrix.rid }}-Setup.exe") -Force
          }

          $appImage = Get-ChildItem -Path $env:PACK_DIR -Filter '*.AppImage' -File | Select-Object -First 1
          if ($appImage) {
            Copy-Item $appImage.FullName (Join-Path $releaseDir "$env:APP_NAME-$env:VERSION-${{ matrix.rid }}.AppImage") -Force
          }

          Get-ChildItem -Path $env:PACK_DIR -File | Where-Object {
            $_.Name -clike '*-portable.zip' -or
            $_.Name -clike '*-portable.tar.gz' -or
            $_.Name -like '*.nupkg' -or
            $_.Name -like 'releases*.json'
          } | ForEach-Object {
            Copy-Item $_.FullName (Join-Path $releaseDir $_.Name) -Force
          }

          $prepared = Get-ChildItem -Path $releaseDir -File
          if (-not $prepared) {
            Write-Error 'No release assets were prepared.'
          }

          "RELEASE_ASSETS_DIR=$releaseDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload release assets (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          uploads=("$RELEASE_ASSETS_DIR"/*)
          if [[ ${#uploads[@]} -eq 0 ]]; then
            echo "No files to upload." >&2
            exit 1
          fi

          gh release upload "$TAG" "${uploads[@]}" --repo "$REPO" --clobber

      - name: Upload release assets (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $uploads = Get-ChildItem -Path $env:RELEASE_ASSETS_DIR -File | Sort-Object Name | Select-Object -ExpandProperty FullName
          if (-not $uploads) {
            Write-Error 'No files to upload.'
          }

          & gh release upload $env:TAG $uploads --repo $env:REPO --clobber

  finalize_release:
    name: Update release notes
    runs-on: ubuntu-latest
    needs:
      - metadata
      - build
    if: ${{ needs.build.result == 'success' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          sparse-checkout: |
            .github/release-template.md

      - name: Build commit changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          mode: COMMIT
          toTag: ${{ needs.metadata.outputs.tag }}
          failOnError: false

      - name: Update release notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.metadata.outputs.tag }}
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.metadata.outputs.version }}
          CHANNEL: ${{ needs.metadata.outputs.channel }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
        run: |
          set -euo pipefail

          app_name="${APP_NAME:-carton}"
          base_url="https://github.com/$REPO/releases/download/$TAG"
          notes_file="$RUNNER_TEMP/release-notes.md"
          template_file=".github/release-template.md"
          singbox_tag="$(gh api repos/SagerNet/sing-box/releases/latest --jq .tag_name 2>/dev/null || true)"
          if [[ -n "$singbox_tag" ]]; then
            singbox_version="${singbox_tag#v}"
          else
            singbox_version="unknown"
          fi

          sed \
            -e "s|__APP_NAME__|$app_name|g" \
            -e "s|__VERSION__|$VERSION|g" \
            -e "s|__TAG__|$TAG|g" \
            -e "s|__REPO__|$REPO|g" \
            -e "s|__BASE_URL__|$base_url|g" \
            -e "s|__CHANNEL__|$CHANNEL|g" \
            -e "s|__SINGBOX_VERSION__|$singbox_version|g" \
            "$template_file" > "$notes_file"

          if [[ -n "${CHANGELOG//[[:space:]]/}" ]]; then
            {
              echo ""
              echo "**Commit Logs**"
              echo ""
              printf '%s\n' "$CHANGELOG"
            } >> "$notes_file"
          fi

          gh release edit "$TAG" --repo "$REPO" --notes-file "$notes_file"
